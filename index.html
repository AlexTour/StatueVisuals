<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Statue Glitch Party</title>

  <!-- Import map for Three.js (required for effects) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.169.0"
      }
    }
  </script>

  <!-- Model Viewer -->
  <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js" type="module"></script>
  
  <!-- Model Viewer Effects -->
  <script src="https://unpkg.com/@google/model-viewer-effects@latest/dist/model-viewer-effects.js" type="module"></script>

  <style>
    body { margin:0; background:#000; overflow:hidden; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #050505;
    }
  </style>
</head>
<body>

  <model-viewer
    id="statue"
    src="sapphoModel.glb"
    alt="Silver Statue"
    camera-controls="false"
    auto-rotate
    auto-rotate-delay="600"
    rotation-per-second="0.09rad"
    exposure="1.4"
    shadow-intensity="1.5"
    shadow-softness="0.9"
    environment-intensity="0.8"
    tone-mapping="aces"
    style="width:100vw; height:100vh;"
  >
    <effect-composer render-mode="quality" msaa="2">
      
      <!-- Strong Bloom -->
      <bloom-effect
        intensity="3.2"
        luminance-threshold="0.35"
        luminance-smoothing="0.25"
        radius="1.4"
        blend-mode="add">
      </bloom-effect>

      <!-- Glitch (more frequent & intense) -->
      <glitch-effect
        delay="1.2"
        duration="0.25"
        strength="0.85"
        active>
      </glitch-effect>

      <!-- Color Grade (helps with silver + bloom) -->
      <color-grade-effect
        tone-mapping="aces"
        brightness="1.1"
        contrast="1.15"
        saturation="1.25">
      </color-grade-effect>

    </effect-composer>
  </model-viewer>

  <script type="module">
    const modelViewer = document.getElementById('statue');

    // Stronger custom animation loop (vertex noise simulation via rotation + occasional stutter)
    let time = 0;
    function animate() {
      time += 0.016;

      // Occasional temporal stutter / frame skip feel
      if (Math.random() < 0.022) {
        if (modelViewer.rotation) {
          modelViewer.rotation.y += 0.18;
        }
      }

      requestAnimationFrame(animate);
    }
    animate();

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') modelViewer.setAttribute('auto-rotate', 'false');
      if (e.key === 'g' || e.key === 'G') modelViewer.setAttribute('auto-rotate', 'true');
      if (e.key === 'r' || e.key === 'R') location.reload(); // quick restart
    });

    // Optional: Lock camera to a nice angle for projection
    modelViewer.addEventListener('load', () => {
      modelViewer.cameraOrbit = "45deg 75deg 9m";   // nice 3/4 view
      modelViewer.cameraTarget = "0m 0.5m 0m";
    });
  </script>
</body>
</html>
