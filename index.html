<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Statue Glitch Party</title>

  <!-- Model Viewer (latest stable) -->
  <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js" type="module"></script>
  
  <!-- Model Viewer Effects -->
  <script src="https://unpkg.com/@google/model-viewer-effects@latest/dist/model-viewer-effects.js" type="module"></script>

  <style>
    body { 
      margin:0; 
      background:#000; 
      overflow:hidden; 
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #050505;
    }
  </style>
</head>
<body>

  <model-viewer
    id="statue"
    src="sapphoModel.glb"
    alt="Silver Statue"
    camera-controls="false"
    auto-rotate
    auto-rotate-delay="500"
    rotation-per-second="0.1rad"
    exposure="1.45"
    shadow-intensity="1.6"
    shadow-softness="1"
    environment-intensity="0.85"
    tone-mapping="aces"
    style="width:100vw; height:100vh;"
  >
    <effect-composer render-mode="quality" multisampling="4">
      
      <!-- 🔥 Very Strong Bloom -->
      <bloom-effect
        intensity="3.8"
        luminance-threshold="0.25"
        luminance-smoothing="0.2"
        radius="1.5"
        blend-mode="add">
      </bloom-effect>

      <!-- Intense Glitch -->
      <glitch-effect
        delay="0.8"
        duration="0.2"
        strength="0.95"
        active>
      </glitch-effect>

      <!-- Color grading for silver metallic look -->
      <color-grade-effect
        brightness="1.15"
        contrast="1.2"
        saturation="1.3">
      </color-grade-effect>

    </effect-composer>
  </model-viewer>

  <script type="module">
    const modelViewer = document.getElementById('statue');

    modelViewer.addEventListener('load', () => {
      // Nice locked camera angle for your statue
      modelViewer.cameraOrbit = "35deg 72deg 10m";
      modelViewer.cameraTarget = "0m 0.8m 0m";
      console.log("✅ Model loaded with effects");
    });

    // Custom stutter / temporal glitch
    let time = 0;
    function animate() {
      time += 0.016;
      if (Math.random() < 0.025) {
        modelViewer.rotation = (modelViewer.rotation || 0) + 0.22;
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'f') modelViewer.setAttribute('auto-rotate', 'false');
      if (e.key.toLowerCase() === 'g') modelViewer.setAttribute('auto-rotate', 'true');
      if (e.key.toLowerCase() === 'r') location.reload();
    });
  </script>
</body>
</html>
